name: Pixel 8 Pro (husky) Kernel Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Build Version Label (e.g. v1.0, beta1, R1; leave empty for default)"
        required: false
        type: string
        default: ""
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      use_zram:
        description: "Enable ZRAM Enhanced Algorithms"
        required: true
        type: boolean
        default: false
      zram_full_algo:
        description: "Enable ZRAM Full Algorithm Support (lzo/lz4/lz4hc/lz4k/lz4kd/deflate/842/zstd)"
        required: false
        type: boolean
        default: false
      zram_extra_algos:
        description: "Custom ZRAM Algorithms (comma-separated)"
        required: false
        type: string
        default: ""
      use_bbg:
        description: "Enable BBG Anti-Brick"
        required: true
        type: boolean
        default: true
      use_ddk:
        description: "Enable DDK LSM"
        required: true
        type: boolean
        default: false
      use_ntsync:
        description: "Enable NTsync"
        required: true
        type: boolean
        default: true
      use_networking:
        description: "Enable Networking Enhancement (IPSet + BBR)"
        required: true
        type: boolean
        default: true
      use_kpm:
        description: "Enable KPM — NOT supported with Official KernelSU"
        required: true
        type: boolean
        default: false
      kpm_password:
        description: "Custom KPM Super Password (leave empty for default)"
        required: false
        type: string
        default: ""
      use_rekernel:
        description: "Enable Re-Kernel Driver"
        required: false
        type: boolean
        default: false
      virtualization_support:
        description: "Virtualization Support (6.1: off/678/123/345)"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      use_custom_external_modules:
        description: "Enable Custom External Module Injection"
        required: false
        type: boolean
        default: false
      custom_external_modules:
        description: "Custom External Modules"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  actions: write

env:
  KERNEL_BRANCH: android-gs-shusky-6.1-android16
  KERNEL_ROOT: ${{ github.workspace }}/kernel

jobs:
  build-pixel8pro-kernel:
    name: "Pixel 8 Pro (husky) | android-gs-shusky-6.1-android16${{ inputs.version && format(' | {0}', inputs.version) || '' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ============================================================
      # 1. Build info
      # ============================================================
      - name: 构建信息摘要
        run: |
          echo "========================================"
          echo "   Pixel 8 Pro (husky) Kernel Builder"
          echo "========================================"
          echo "设备          : Pixel 8 Pro (husky)"
          echo "内核分支      : $KERNEL_BRANCH"
          echo "GKI           : android14-6.1 (Tensor G3)"
          echo "KernelSU      : Official"
          echo "SUSFS         : ${{ inputs.enable_susfs }}"
          echo "ZRAM          : ${{ inputs.use_zram }}"
          echo "BBG           : ${{ inputs.use_bbg }}"
          echo "DDK           : ${{ inputs.use_ddk }}"
          echo "NTsync        : ${{ inputs.use_ntsync }}"
          echo "Networking    : ${{ inputs.use_networking }}"
          echo "========================================"

      # ============================================================
      # 2. Disk cleanup
      # ============================================================
      - name: 清理磁盘空间
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      # ============================================================
      # 3. Checkout
      # ============================================================
      - uses: actions/checkout@v6

      # ============================================================
      # 4. Install deps
      # ============================================================
      - name: 安装编译依赖
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update; then break; fi
            sudo apt-get clean || true
            sudo rm -rf /var/lib/apt/lists/*
            sleep "$attempt"
          done
          sudo apt-get install -y ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves zip

      # ============================================================
      # 5. ccache + Bazel cache
      # ============================================================
      - name: 配置缓存
        run: |
          mkdir -p ~/.cache/bazel
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ============================================================
      # 6. Setup repo tool
      # ============================================================
      - name: 安装 repo 工具
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.repo-bin"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/.repo-bin/repo"
          chmod 0755 "$GITHUB_WORKSPACE/.repo-bin/repo"
          echo "$GITHUB_WORKSPACE/.repo-bin" >> "$GITHUB_PATH"
          echo "REPO=$GITHUB_WORKSPACE/.repo-bin/repo" >> $GITHUB_ENV

      # ============================================================
      # 7. Git config
      # ============================================================
      - name: 配置 Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "BuildGkiKernel@gmail.com"

      # ============================================================
      # 8. Clone patch repos (SUSFS, kernel_patches)
      # ============================================================
      - name: 克隆补丁仓库
        run: |
          if [ "${{ inputs.enable_susfs }}" == "true" ]; then
            echo "克隆 SUSFS (gki-android14-6.1)..."
            for attempt in 1 2 3; do
              if git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-6.1 --depth 1 susfs4ksu; then
                break
              fi
              rm -rf susfs4ksu
              sleep "$attempt"
            done
          fi
          git clone https://github.com/WildKernels/kernel_patches.git --depth 1 || true
          echo "SUSFS4KSU=$GITHUB_WORKSPACE/susfs4ksu" >> $GITHUB_ENV
          echo "KERNEL_PATCHES=$GITHUB_WORKSPACE/kernel_patches" >> $GITHUB_ENV

      # ============================================================
      # 9. Repo init + sync kernel manifest
      # ============================================================
      - name: 同步内核 manifest
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          mkdir -p "$KERNEL_ROOT"
          echo "repo init -b $KERNEL_BRANCH"
          $REPO init -u https://android.googlesource.com/kernel/manifest \
            -b "$KERNEL_BRANCH" --repo-rev=v2.16
          $REPO sync -c -j$(nproc --all) --no-tags --fail-fast
          echo "=== repo sync done ==="
          echo "顶层目录:"
          ls -la
          echo ""
          echo "=== 搜索内核 Makefile ==="
          find . -maxdepth 3 -name "Makefile" 2>/dev/null | head -20 || echo "(none found)"

      # ============================================================
      # 10. First build (stock) — fetches kernel source via Bazel
      # ============================================================
      - name: 首次构建 (stock kernel)
        working-directory: ${{ env.KERNEL_ROOT }}
        timeout-minutes: 50
        run: |
          set -e
          echo "=== 首次构建: stock Pixel 8 Pro kernel ==="

          # Run Kleaf build — this downloads kernel source & builds
          BUILD_AOSP_KERNEL=1 bash build_shusky.sh 2>&1 | tail -100

          echo "=== 首次构建完成 ==="
          echo ""
          echo "=== out/shusky/dist/ 内容 ==="
          ls -la out/shusky/dist/ 2>/dev/null || echo "(out/shusky/dist not found)"
          echo ""
          echo "=== 搜索内核源码 ==="
          find . -maxdepth 4 -name "Makefile" 2>/dev/null | head -20
          find . -maxdepth 3 -type d -name "drivers" 2>/dev/null | head -10

      # ============================================================
      # 11. Locate kernel source (after Bazel fetched it)
      # ============================================================
      - name: 定位内核源码目录
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail
          echo "=== 搜索 drivers/ + Makefile ==="

          # Search broadly — Bazel workspace can put source in various places
          KERNEL_SRC=""
          for candidate in $(find . -maxdepth 5 -type d -name "drivers" 2>/dev/null); do
            candidate_dir="$(dirname "$candidate")"
            if [ -f "$candidate_dir/Makefile" ]; then
              KERNEL_SRC="$(realpath "$candidate_dir")"
              echo ">>> 找到内核源码: $KERNEL_SRC"
              break
            fi
          done

          if [ -z "$KERNEL_SRC" ]; then
            echo "::error::找不到内核源码目录 (drivers/ + Makefile)"
            echo "完整目录树 (maxdepth 4):"
            find . -maxdepth 4 -type d 2>/dev/null | sort | head -80
            exit 1
          fi

          echo "KERNEL_SRC=$KERNEL_SRC" >> $GITHUB_ENV
          echo "DEFCONFIG=$KERNEL_SRC/arch/arm64/configs/gki_defconfig" >> $GITHUB_ENV

          KVER=$(grep '^VERSION = ' "$KERNEL_SRC/Makefile" | awk '{print $3}')
          KPATCH=$(grep '^PATCHLEVEL = ' "$KERNEL_SRC/Makefile" | awk '{print $3}')
          KSUB=$(grep '^SUBLEVEL = ' "$KERNEL_SRC/Makefile" | awk '{print $3}')
          echo "KERNEL_VERSION=${KVER}.${KPATCH}.${KSUB}" >> $GITHUB_ENV
          echo "内核版本: ${KVER}.${KPATCH}.${KSUB}"

      # ============================================================
      # 12. Apply KernelSU Official
      # ============================================================
      - name: 添加 KernelSU Official
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          echo "=== 添加 KernelSU Official ==="
          echo "工作目录: $(pwd)"
          echo "drivers/ 存在: $([ -d drivers ] && echo YES || echo NO)"
          echo "Makefile 存在: $([ -f Makefile ] && echo YES || echo NO)"

          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "$KERNEL_BRANCH"

          cd KernelSU
          KSU_GIT_VERSION=$(git rev-list --count HEAD)
          KSU_VERSION=$((30000 + KSU_GIT_VERSION))
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          if [ -f "kernel/Kbuild" ]; then
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          fi
          cd ..
          echo "KernelSU 版本: $KSU_VERSION"

      # ============================================================
      # 13. Apply SUSFS
      # ============================================================
      - name: 应用 SUSFS 补丁
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          echo "=== 应用 SUSFS 补丁 ==="

          # Copy SUSFS source files
          cp "$SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch" ./
          cp "$SUSFS4KSU"/kernel_patches/fs/* ./fs/ 2>/dev/null || true
          cp "$SUSFS4KSU"/kernel_patches/include/linux/* ./include/linux/ 2>/dev/null || true

          # Apply KernelSU SUSFS hook
          if [ -d KernelSU ]; then
            cd KernelSU
            cp "$SUSFS4KSU/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" ./
            if grep -q 'diff --git a/kernel/Makefile' 10_enable_susfs_for_ksu.patch \
              && ! grep -q 'diff --git a/kernel/Kbuild' 10_enable_susfs_for_ksu.patch; then
              sed -i 's|kernel/Makefile|kernel/Kbuild|g' 10_enable_susfs_for_ksu.patch
            fi
            patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true
            cd ..
          fi

          # Apply GKI SUSFS patch
          patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || true

          # Fix task_mmu.c
          if [ -f "./fs/proc/task_mmu.c" ]; then
            sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c 2>/dev/null || true
            if ! grep -qF 'goto show_pad;' ./fs/proc/task_mmu.c; then
              sed -i '/^[[:space:]]*show_pad:[[:space:]]*$/d' ./fs/proc/task_mmu.c 2>/dev/null || true
            fi
          fi
          echo "SUSFS 补丁完成"

      # ============================================================
      # 14. SUSFS defconfig
      # ============================================================
      - name: 配置 SUSFS defconfig
        if: inputs.enable_susfs
        run: |
          cat >> "$KERNEL_SRC/arch/arm64/configs/gki_defconfig" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      # ============================================================
      # 15. ZRAM
      # ============================================================
      - name: 应用 ZRAM 补丁
        if: inputs.use_zram
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          ZRAM="$KERNEL_PATCHES/wild/zram"
          apply() { [ -f "$1" ] && patch -p1 --forward < "$1" || true; }
          apply "$ZRAM/zram_enhance.patch"
          [ "${{ inputs.zram_full_algo }}" == "true" ] && apply "$ZRAM/zram_full_algo.patch"
          if [ -n "${{ inputs.zram_extra_algos }}" ]; then
            IFS=',' read -r -a ALGOS <<< "${{ inputs.zram_extra_algos }}"
            for algo in "${ALGOS[@]}"; do
              algo=$(echo "$algo" | xargs)
              [ -n "$algo" ] && apply "$ZRAM/zram_${algo}.patch"
            done
          fi
          echo "ZRAM done"

      # ============================================================
      # 16. BBG
      # ============================================================
      - name: 应用 BBG 补丁
        if: inputs.use_bbg
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          BBG="$KERNEL_PATCHES/wild/bbg/bbg.patch"
          [ -f "$BBG" ] && patch -p1 --forward < "$BBG" || true
          grep -q "CONFIG_BBG=y" arch/arm64/configs/gki_defconfig || echo "CONFIG_BBG=y" >> arch/arm64/configs/gki_defconfig
          echo "BBG done"

      # ============================================================
      # 17. DDK
      # ============================================================
      - name: 应用 DDK LSM
        if: inputs.use_ddk
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          DDK="$KERNEL_PATCHES/wild/ddk/ddk.patch"
          [ -f "$DDK" ] && patch -p1 --forward < "$DDK" || true
          echo "DDK done"

      # ============================================================
      # 18. NTsync
      # ============================================================
      - name: 应用 NTsync
        if: inputs.use_ntsync
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          NTSYNC="$KERNEL_PATCHES/wild/ntsync/ntsync.patch"
          [ -f "$NTSYNC" ] && patch -p1 --forward < "$NTSYNC" || true
          grep -q "CONFIG_NTSYNC=y" arch/arm64/configs/gki_defconfig || echo "CONFIG_NTSYNC=y" >> arch/arm64/configs/gki_defconfig
          echo "NTsync done"

      # ============================================================
      # 19. Networking
      # ============================================================
      - name: 应用 Networking 增强
        if: inputs.use_networking
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          IPSET="$KERNEL_PATCHES/wild/networking/ipset.patch"
          BBR="$KERNEL_PATCHES/wild/networking/bbr.patch"
          [ -f "$IPSET" ] && patch -p1 --forward < "$IPSET" || true
          [ -f "$BBR" ] && patch -p1 --forward < "$BBR" || true
          D=arch/arm64/configs/gki_defconfig
          for cfg in "CONFIG_TCP_CONG_ADVANCED=y" "CONFIG_TCP_CONG_BBR=y" "CONFIG_DEFAULT_BBR=y" 'CONFIG_DEFAULT_TCP_CONG="bbr"' "CONFIG_NET_SCH_FQ=y"; do
            grep -qF "$cfg" "$D" || echo "$cfg" >> "$D"
          done
          echo "Networking done"

      # ============================================================
      # 20. KPM
      # ============================================================
      - name: 应用 KPM
        if: inputs.use_kpm
        run: |
          echo "::error::KPM not supported with Official KernelSU"
          exit 1

      # ============================================================
      # 21. Virtualization
      # ============================================================
      - name: 应用虚拟化补丁
        if: inputs.virtualization_support != 'off'
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          V="$KERNEL_PATCHES/wild/virtualization/slot_${{ inputs.virtualization_support }}.patch"
          [ -f "$V" ] && patch -p1 --forward < "$V" || echo "::warning::patch not found: $V"

      # ============================================================
      # 22. Configure kernel name
      # ============================================================
      - name: 配置内核名称
        run: |
          D="$KERNEL_SRC/arch/arm64/configs/gki_defconfig"
          # Strip protected exports for Kleaf
          sed -i '/"protected_exports_list"/d' "$KERNEL_SRC/BUILD.bazel" 2>/dev/null || true
          sed -i '/kmi_symbol_list_strict_mode/d' "$KERNEL_SRC/BUILD.bazel" 2>/dev/null || true
          rm -rf "$KERNEL_SRC"/android/abi_gki_protected_exports_* 2>/dev/null || true
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" "$KERNEL_ROOT/build/kernel/kleaf/impl/stamp.bzl" 2>/dev/null || true

          V_INPUT=$(echo "${{ inputs.version }}" | tr -d '[:space:]')
          if [ -n "$V_INPUT" ]; then
            CLEAN=$(echo "$V_INPUT" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+//')
            sed -i '/^CONFIG_LOCALVERSION=/ s/="\([^"]*\)"/="'"$CLEAN"'"/' "$D" 2>/dev/null || true
            echo "Version: $CLEAN"
          else
            cd "$KERNEL_SRC"
            BID="ab$((RANDOM % 90000000 + 10000000))"
            GHASH=$(git rev-parse --verify HEAD 2>/dev/null | cut -c1-13 || echo "unknown")
            KMI="-android14-11-g${GHASH}-${BID}-4k"
            sed -i "/^CONFIG_LOCALVERSION=/ s/=\"[^\"]*\"/=\"${KMI}\"/" "$D" 2>/dev/null || true
            echo "Version: $KMI"
          fi

      # ============================================================
      # 23. Second build (with patches)
      # ============================================================
      - name: 二次构建 (with KernelSU + patches)
        working-directory: ${{ env.KERNEL_ROOT }}
        timeout-minutes: 50
        run: |
          echo "=== 二次构建: Pixel 8 Pro + KernelSU ==="
          BUILD_AOSP_KERNEL=1 bash build_shusky.sh 2>&1 | tail -100
          echo "=== 构建完成 ==="
          echo ""
          echo "=== out/shusky/dist/ ==="
          ls -la out/shusky/dist/ 2>/dev/null || echo "(not found)"
          echo ""
          echo "=== 所有 boot*.img/dtbo*.img/vendor_* ==="
          find out/ -maxdepth 4 \( -name "boot*.img" -o -name "dtbo*.img" -o -name "vendor_*.img" \) 2>/dev/null | sort

      # ============================================================
      # 24. Collect images & package
      # ============================================================
      - name: 收集镜像并打包
        run: |
          set -ex
          DIST="$KERNEL_ROOT/out/shusky/dist"
          OUT="$GITHUB_WORKSPACE/out"
          mkdir -p "$OUT"

          # Collect required images
          for img in boot.img dtbo.img vendor_kernel_boot.img; do
            if [ -f "$DIST/$img" ]; then
              cp "$DIST/$img" "$OUT/"
              echo "OK: $img ($(du -h "$OUT/$img" | cut -f1))"
            else
              echo "MISSING: $img (searched $DIST)"
            fi
          done

          # Also copy Image.lz4 if exists
          [ -f "$DIST/Image.lz4" ] && cp "$DIST/Image.lz4" "$OUT/" && echo "OK: Image.lz4"
          [ -f "$DIST/Image" ] && cp "$DIST/Image" "$OUT/" && echo "OK: Image"

          echo ""
          echo "=== 产物清单 ==="
          ls -la "$OUT/"

          # Create flashable zip
          ZIP="husky-kernel-${{ env.KERNEL_BRANCH }}"
          [ -n "${{ inputs.version }}" ] && ZIP="${ZIP}-${{ inputs.version }}"
          ZIP="${ZIP}.zip"
          cd "$OUT"
          zip -r9 "$GITHUB_WORKSPACE/$ZIP" .
          echo "=== 打包完成: $ZIP ==="
          ls -la "$GITHUB_WORKSPACE/$ZIP"

      # ============================================================
      # 25. Upload
      # ============================================================
      - name: 上传构建产物
        uses: actions/upload-artifact@v6
        if: always() && !cancelled()
        with:
          name: husky-kernel-${{ env.KERNEL_BRANCH }}
          path: |
            *.zip
            out/*
          if-no-files-found: warn

      # ============================================================
      # 26. AnyKernel3 (optional, from Image.lz4)
      # ============================================================
      - name: 创建 AnyKernel3 包
        if: always() && !cancelled()
        run: |
          set -ex
          cd "$GITHUB_WORKSPACE"
          if [ ! -f out/Image ] && [ ! -f out/Image.lz4 ]; then
            echo "No Image file, skipping AnyKernel3"
            exit 0
          fi

          git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 --depth 1 AnyKernel3 2>/dev/null || true
          rm -rf AnyKernel3/.git
          [ -f out/Image ] && cp out/Image AnyKernel3/
          [ -f out/Image.lz4 ] && cp out/Image.lz4 AnyKernel3/

          ZIP="husky-AnyKernel3-KSU-Official"
          [ -n "${{ inputs.version }}" ] && ZIP="${ZIP}-${{ inputs.version }}"
          ZIP="${ZIP}.zip"
          cd AnyKernel3
          zip -r9 "../$ZIP" . -x '.git/*'
          cd ..
          echo "AnyKernel3: $ZIP"
          ls -la "$ZIP"

      - name: 上传 AnyKernel3
        uses: actions/upload-artifact@v6
        if: always() && !cancelled()
        with:
          name: husky-anykernel3
          path: |
            *.zip
          if-no-files-found: warn

  # ============================================================
  # KernelSU Manager APK
  # ============================================================
  get-ksu-manager:
    needs: build-pixel8pro-kernel
    if: always() && !cancelled()
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: "Official"
      ksu_branch: "Latest(最新)"
